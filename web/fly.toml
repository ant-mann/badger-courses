app = "uw-madison-courses"
primary_region = "ord"

[build]
  # Deploy from the repo root so the Dockerfile can copy shared workspace files.
  dockerfile = "web/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  SUPABASE_DATABASE_URL = ""

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
